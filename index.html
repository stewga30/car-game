<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBJ Viewer</title>
<style>
body { margin:0; background:#111; color:white; font-family:sans-serif; }
#panel {
  position:absolute;
  top:10px;
  left:10px;
  width:300px;
  background:#222;
  padding:10px;
  border-radius:8px;
}
textarea { width:100%; height:180px; }
button { width:100%; margin-top:6px; padding:8px; }
</style>
</head>
<body>

<div id="panel">
<h3>OBJ Viewer</h3>
<textarea id="objInput">
# paste OBJ model here
</textarea>
<button onclick="loadOBJ()">Load Model</button>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);
camera.position.set(3,3,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

let currentModel;

window.loadOBJ = function(){

const text = document.getElementById("objInput").value;

const loader = new OBJLoader();
const object = loader.parse(text);

if(currentModel) scene.remove(currentModel);

currentModel = object;
scene.add(object);

};

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

animate();

window.addEventListener("resize", () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>s
