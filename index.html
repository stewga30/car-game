<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easy OBJ Viewer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#222;
color:white;
}

#panel{
position:absolute;
top:10px;
left:10px;
width:320px;
background:#333;
padding:12px;
border-radius:8px;
}

textarea{
width:100%;
height:180px;
background:#111;
color:white;
border:1px solid #555;
}

button{
width:100%;
margin-top:6px;
padding:10px;
font-size:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="panel">
<h3>OBJ Viewer</h3>

<p>Paste OBJ model text below:</p>

<textarea id="objInput">
# paste OBJ here
</textarea>

<button onclick="loadModel()">Load Model</button>
<button onclick="resetCamera()">Reset View</button>

<p>Mouse drag = rotate<br>Scroll = zoom</p>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x303030);

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(3,2,5);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new OrbitControls(camera,renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));
scene.add(new THREE.GridHelper(20,20));

let currentModel;

window.loadModel = function(){

let text = document.getElementById("objInput").value;

try{

let loader = new OBJLoader();
let obj = loader.parse(text);

if(currentModel) scene.remove(currentModel);

currentModel = obj;
scene.add(obj);

}catch(err){

alert("OBJ failed to load.");

}

};

window.resetCamera = function(){

camera.position.set(3,2,5);
controls.update();

};

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
