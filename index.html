<!DOCTYPE html>
<html>
<head>
<title>OBJ Viewer</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:white}
#ui{position:absolute;top:10px;left:10px;width:300px}
textarea{width:100%;height:200px}
button{width:100%;padding:10px;margin-top:5px}
</style>
</head>
<body>

<div id="ui">
<h3>OBJ Viewer</h3>
<textarea id="objInput">
# paste OBJ model here
</textarea>
<button onclick="loadOBJ()">Load Model</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/OBJLoader.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

let currentModel;

function loadOBJ(){

const text = document.getElementById("objInput").value;
const loader = new THREE.OBJLoader();

const object = loader.parse(text);

if(currentModel) scene.remove(currentModel);

currentModel = object;
scene.add(object);

}

function animate(){
requestAnimationFrame(animate);
if(currentModel) currentModel.rotation.y += 0.01;
renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
